<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skat">
<link rel="manifest" href="manifest.json">
<title>Skat Anschreibung</title>
<style>
/* Playfair Display (für Überschriften) */
  @font-face {
    font-family: 'Playfair Display';
    font-weight: 700;
    src: url('fonts/playfair-display-v40-latin-700.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Playfair Display';
    font-weight: 900;
    src: url('fonts/playfair-display-v40-latin-900.woff2') format('woff2');
  }

  /* Source Code Pro (für Texte und Zahlen) */
  @font-face {
    font-family: 'Source Code Pro';
    font-weight: 400;
    src: url('fonts/source-code-pro-v31-latin-regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Source Code Pro';
    font-weight: 600;
    src: url('fonts/source-code-pro-v31-latin-600.woff2') format('woff2');
  }

  :root {
    --bg:#0f0f1a; --surface:#1a1a2e; --card:#16213e;
    --accent:#e8b04b; --accent2:#c84b31;
    --green:#2ecc71; --red:#e74c3c;
    --text:#f0e6d3; --muted:#7a7a9a; --border:#2a2a4a; --purple:#a855f7;
    --fs:1;
  }

  /* ===== HELLES THEME ===== */
  html[data-theme="light"] {
    --bg:#f0f2f5; --surface:#ffffff; --card:#ffffff;
    --accent:#1a3a8f; --accent2:#8f1a1a;
    --green:#1a6b3a; --red:#8f1a1a;
    --text:#111111; --muted:#555577; --border:#c0c8d8; --purple:#4a1a8f;
  }
  html[data-theme="light"] body::before { display:none }
  html[data-theme="light"] header { background:#1a3a8f; box-shadow:0 2px 8px rgba(0,0,0,.2) }
  html[data-theme="light"] .logo { color:#ffffff }
  html[data-theme="light"] .btn-icon { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); color:#ffffff }
  html[data-theme="light"] .lang-btn { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); color:#ffffff }
  html[data-theme="light"] .lang-dropdown { background:#ffffff; border-color:#1a3a8f; box-shadow:0 4px 16px rgba(0,0,0,.2) }
  html[data-theme="light"] .lang-option { color:#111111 }
  html[data-theme="light"] .lang-option:hover, html[data-theme="light"] .lang-option.active { background:rgba(26,58,143,.1); color:#1a3a8f }
  html[data-theme="light"] .view-tabs { background:#f0f2f5; border-bottom-color:#c0c8d8 }
  html[data-theme="light"] .view-tab { background:#ffffff; border-color:#c0c8d8; color:#555577 }
  html[data-theme="light"] .view-tab.active { background:rgba(26,58,143,.1); border-color:#1a3a8f; color:#1a3a8f }
  html[data-theme="light"] thead th { background:#ffffff; color:#1a3a8f; border-bottom-color:#1a3a8f }
  html[data-theme="light"] thead th.col-val, html[data-theme="light"] thead th.col-type { color:#555577 }
  html[data-theme="light"] tbody tr { border-bottom-color:#e0e4ec }
  html[data-theme="light"] tbody tr:nth-child(even) { background:rgba(26,58,143,.03) }
  html[data-theme="light"] tbody tr.editing { background:rgba(26,58,143,.08); outline-color:#1a3a8f }
  html[data-theme="light"] tbody tr.editable:active { background:rgba(26,58,143,.08) }
  html[data-theme="light"] tfoot td { background:rgba(26,58,143,.05); border-top-color:#1a3a8f }
  html[data-theme="light"] tfoot td:first-child { color:#1a3a8f }
  html[data-theme="light"] tfoot tr.sf-row td { background:rgba(74,26,143,.05); border-top-color:rgba(74,26,143,.4) }
  html[data-theme="light"] tfoot tr.sf-row td:first-child { color:#4a1a8f }
  html[data-theme="light"] tfoot tr.bl-row td { background:rgba(26,107,58,.05); border-top-color:rgba(26,107,58,.3) }
  html[data-theme="light"] tfoot tr.dimmed td { color:#aaaacc !important; border-top-color:#c0c8d8 !important; background:transparent !important }
  html[data-theme="light"] tfoot tr.dimmed td:first-child { color:#aaaacc !important }
  html[data-theme="light"] tfoot tr.dimmed .score-val { color:#aaaacc !important }
  html[data-theme="light"] .input-panel { background:#ffffff; border-top:2px solid #1a3a8f; box-shadow:0 -4px 20px rgba(0,0,0,.12) }
  html[data-theme="light"] .panel-summary { background:#ffffff }
  html[data-theme="light"] .sum-players { color:#1a3a8f; font-weight:700 }
  html[data-theme="light"] .player-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .player-btn.selected { background:#1a3a8f !important; border-color:#1a3a8f !important; color:#ffffff !important }
  html[data-theme="light"] .player-btn.selected .p-name { color:#ffffff !important }
  html[data-theme="light"] .player-btn.selected .p-pts { color:rgba(255,255,255,.8) !important }
  html[data-theme="light"] .player-btn:disabled { opacity:.3 }
  html[data-theme="light"] .type-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .type-btn.active { background:#1a3a8f; border-color:#1a3a8f; color:#ffffff }
  html[data-theme="light"] .opt-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .opt-btn.active { background:#1a3a8f; border-color:#1a3a8f; color:#ffffff }
  html[data-theme="light"] .dbl-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .dbl-btn.active { background:#1a3a8f; border-color:#1a3a8f; color:#ffffff }
  html[data-theme="light"] .null-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .null-btn.active { background:#1a3a8f; border-color:#1a3a8f; color:#ffffff }
  html[data-theme="light"] .jack-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .jack-btn.active { background:#1a3a8f; border-color:#1a3a8f; color:#ffffff }
  html[data-theme="light"] .sign-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .sign-btn.positive { background:#1a6b3a; border-color:#1a6b3a; color:#ffffff }
  html[data-theme="light"] .sign-btn.negative { background:#8f1a1a; border-color:#8f1a1a; color:#ffffff }
  html[data-theme="light"] .add-btn { background:#1a3a8f; color:#ffffff }
  html[data-theme="light"] .add-btn.edit-mode { background:#1a5a8f }
  html[data-theme="light"] .vormerken-btn { background:#1a6b3a; color:#ffffff; border-color:#1a6b3a }
  html[data-theme="light"] .ramsch-input { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .ramsch-input:focus { border-color:#1a3a8f; background:#ffffff }
  html[data-theme="light"] .calc-display { background:rgba(26,58,143,.06); border-color:rgba(26,58,143,.2) }
  html[data-theme="light"] .calc-val { color:#1a3a8f }
  html[data-theme="light"] .calc-formula { color:#555577 }
  html[data-theme="light"] .detail-section-label { color:#555577; border-bottom-color:#c0c8d8 }
  html[data-theme="light"] #stage2summary { background:rgba(26,58,143,.06); border-color:rgba(26,58,143,.3); color:#1a3a8f }
  html[data-theme="light"] .hint { color:#555577 }
  html[data-theme="light"] .modal { background:#ffffff; border-color:#c0c8d8 }
  html[data-theme="light"] .toast { background:#ffffff; border-color:#1a3a8f }
  html[data-theme="light"] .modal-overlay { background:rgba(0,0,0,.4) }
  html[data-theme="light"] .settings-input { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .currency-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
  html[data-theme="light"] .currency-btn.active { background:#1a3a8f; color:#ffffff; border-color:#1a3a8f }
  html[data-theme="light"] .round-sep td { border-top:2px dashed #c0c8d8 }
  html[data-theme="light"] .open-round { background:rgba(26,58,143,.06) !important }
  html[data-theme="light"] .p-pts { color:#555577 }
  html[data-theme="light"] .score-val.pos { color:#1a6b3a }
  html[data-theme="light"] .score-val.neg { color:#8f1a1a }

  @media (prefers-color-scheme: light) {
    html:not([data-theme="dark"]) {
      --bg:#f0f2f5; --surface:#ffffff; --card:#ffffff;
      --accent:#1a3a8f; --accent2:#8f1a1a;
      --green:#1a6b3a; --red:#8f1a1a;
      --text:#111111; --muted:#555577; --border:#c0c8d8; --purple:#4a1a8f;
    }
    html:not([data-theme="dark"]) body::before { display:none }
    html:not([data-theme="dark"]) header { background:#1a3a8f; box-shadow:0 2px 8px rgba(0,0,0,.2) }
    html:not([data-theme="dark"]) .logo { color:#ffffff }
    html:not([data-theme="dark"]) .btn-icon { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); color:#ffffff }
    html:not([data-theme="dark"]) .lang-btn { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); color:#ffffff }
    html:not([data-theme="dark"]) .lang-dropdown { background:#ffffff; border-color:#1a3a8f }
    html:not([data-theme="dark"]) .lang-option { color:#111111 }
    html:not([data-theme="dark"]) .view-tabs { background:#f0f2f5; border-bottom-color:#c0c8d8 }
    html:not([data-theme="dark"]) .view-tab { background:#ffffff; border-color:#c0c8d8; color:#555577 }
    html:not([data-theme="dark"]) .view-tab.active { background:rgba(26,58,143,.1); border-color:#1a3a8f; color:#1a3a8f }
    html:not([data-theme="dark"]) thead th { background:#ffffff; color:#1a3a8f; border-bottom-color:#1a3a8f }
    html:not([data-theme="dark"]) tbody tr { border-bottom-color:#e0e4ec }
    html:not([data-theme="dark"]) tfoot td { background:rgba(26,58,143,.05); border-top-color:#1a3a8f }
    html:not([data-theme="dark"]) tfoot td:first-child { color:#1a3a8f }
    html:not([data-theme="dark"]) .input-panel { background:#ffffff; border-top:2px solid #1a3a8f; box-shadow:0 -4px 20px rgba(0,0,0,.12) }
    html:not([data-theme="dark"]) .player-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
    html:not([data-theme="dark"]) .player-btn.selected { background:#1a3a8f !important; border-color:#1a3a8f !important; color:#ffffff !important }
    html:not([data-theme="dark"]) .type-btn { background:#f0f2f5; border-color:#c0c8d8; color:#111111 }
    html:not([data-theme="dark"]) .type-btn.active { background:#1a3a8f; border-color:#1a3a8f; color:#ffffff }
    html:not([data-theme="dark"]) .add-btn { background:#1a3a8f; color:#ffffff }
    html:not([data-theme="dark"]) .calc-display { background:rgba(26,58,143,.06); border-color:rgba(26,58,143,.2) }
    html:not([data-theme="dark"]) .score-val.pos { color:#1a6b3a }
    html:not([data-theme="dark"]) .score-val.neg { color:#8f1a1a }
  }

  /* Zoom-Stufen: normal(1.0) groß(1.3) sehr groß(1.6) */
  html.zoom-2 { --fs:1.0;  }
  html.zoom-3 { --fs:1.3;  }
  html.zoom-4 { --fs:1.6;  }
  html body { font-size: calc(13px * var(--fs)); }
  html td  { font-size: calc(12px * var(--fs)) !important; }
  html th  { font-size: calc(11px * var(--fs)) !important; }
  html .score-val { font-size: calc(13px * var(--fs)) !important; }
  html .game-val  { font-size: calc(10px * var(--fs)) !important; }
  html tfoot td   { font-size: calc(14px * var(--fs)) !important; }
  html tfoot tr.sf-row td, html tfoot tr.bl-row td { font-size: calc(12px * var(--fs)) !important; }

  /* Suit colors */
  .suit-d { color: #1a1a2e; background: #e8a030; border-color: #e8a030 }
  .suit-h { color: #fff;    background: #c0392b; border-color: #c0392b }
  .suit-s { color: #fff;    background: #2471a3; border-color: #2471a3 }
  .suit-c { color: #1a1a2e; background: #27ae60; border-color: #27ae60 }
  .farbe-btn[data-fi="0"] { color: #e8a030; border-color: #e8a03060 }
  .farbe-btn[data-fi="1"] { color: #e74c3c; border-color: #e74c3c60 }
  .farbe-btn[data-fi="2"] { color: #5dade2; border-color: #5dade260 }
  .farbe-btn[data-fi="3"] { color: #2ecc71; border-color: #2ecc7160 }
  .farbe-btn.active[data-fi="0"] { background:#e8a030; color:#1a1a2e; border-color:#e8a030 }
  .farbe-btn.active[data-fi="1"] { background:#c0392b; color:#fff;    border-color:#c0392b }
  .farbe-btn.active[data-fi="2"] { background:#2471a3; color:#fff;    border-color:#2471a3 }
  .farbe-btn.active[data-fi="3"] { background:#27ae60; color:#1a1a2e; border-color:#27ae60 }
  .game-type-tag.suit-d { color:#1a1a2e; background:#e8a030; border-radius:3px; padding:1px 4px }
  .game-type-tag.suit-h { color:#fff;    background:#c0392b; border-radius:3px; padding:1px 4px }
  .game-type-tag.suit-s { color:#fff;    background:#2471a3; border-radius:3px; padding:1px 4px }
  .game-type-tag.suit-c { color:#1a1a2e; background:#27ae60; border-radius:3px; padding:1px 4px }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'Source Code Pro',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.01) 2px,rgba(255,255,255,.01) 4px),repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(255,255,255,.01) 2px,rgba(255,255,255,.01) 4px);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:600px;margin:0 auto}

  /* HEADER */
  header{background:linear-gradient(135deg,var(--surface),var(--card));border-bottom:2px solid var(--accent);padding:11px 12px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.5)}
  .logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--accent);display:flex;align-items:center;gap:7px}
  .header-actions{display:flex;gap:6px;align-items:center}
  .btn-icon{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:7px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .btn-icon:active{transform:scale(.9)}

  /* Language selector */
  .lang-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:7px;font-size:12px;padding:3px 6px;cursor:pointer;outline:none;display:flex;align-items:center;gap:3px;position:relative}
  .lang-btn:active{border-color:var(--accent)}
  .lang-dropdown{position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--accent);border-radius:7px;z-index:500;overflow:hidden;display:none;min-width:80px;box-shadow:0 4px 16px rgba(0,0,0,.6)}
  .lang-dropdown.open{display:block}
  .lang-option{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--text);white-space:nowrap}
  .lang-option:hover,.lang-option.active{background:rgba(232,176,75,.15);color:var(--accent)}

  /* View toggle tabs */
  .view-tabs{position:fixed;top:58px;left:0;right:0;display:flex;gap:4px;padding:4px 8px;background:var(--bg);z-index:9;border-bottom:1px solid var(--border);max-width:600px;margin:0 auto}
  .view-tab{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:10px;padding:4px 2px;cursor:pointer;text-align:center;transition:all .15s}
  .view-tab.active{border-color:var(--accent);background:rgba(232,176,75,.12);color:var(--accent);font-weight:700}
  .view-tab:active{transform:scale(.95)}

  /* TABLE */
  .table-wrap{position:fixed;top:90px;left:0;right:0;bottom:var(--panel-h,54px);overflow-y:auto;overflow-x:hidden;padding:0 8px;max-width:600px;margin:0 auto}
  .table-wrap.no-tabs{top:58px}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--card);color:var(--accent);font-family:'Playfair Display',serif;font-size:12px;font-weight:700;padding:8px 5px;text-align:left;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:10}
  thead th:first-child{width:24px;color:var(--muted);font-size:9px}
  thead th.col-val{color:var(--muted);font-size:9px;font-family:'Source Code Pro',monospace;text-align:right}
  thead th.col-type{color:var(--muted);font-size:9px;font-family:'Source Code Pro',monospace;width:46px}
  thead th.aussetzer-col{opacity:.4;font-style:italic}
  .th-aussetzer-badge{display:block;font-size:7px;color:var(--muted);font-family:'Source Code Pro',monospace;font-style:italic;font-weight:400;margin-top:1px}
  td.aussetzer-cell{opacity:.3}
  .th-name{cursor:pointer;}
  .th-edit{background:rgba(232,176,75,.12);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:'Playfair Display',serif;font-size:11px;font-weight:700;width:64px;text-align:center;padding:2px 3px;outline:none}
  tfoot td{background:rgba(232,176,75,.06);border-top:2px solid var(--accent);font-size:14px;font-weight:700;padding:9px 5px;text-align:center}
  tfoot td:first-child{color:var(--accent);font-family:'Playfair Display',serif;font-size:11px;text-align:left}
  tfoot tr.sf-row td{background:rgba(168,85,247,.06);border-top:1px solid rgba(168,85,247,.4);font-size:12px;font-weight:600;padding:6px 5px;text-align:center}
  tfoot tr.sf-row td:first-child{color:#c084fc;font-family:'Playfair Display',serif;font-size:10px;text-align:left}
  tfoot tr.bl-row td{background:rgba(34,197,94,.05);border-top:1px solid rgba(34,197,94,.3);font-size:12px;font-weight:600;padding:6px 5px;text-align:center}
  tfoot tr.dimmed td { color: var(--muted) !important; border-top-color: var(--border) !important; background: transparent !important }
  tfoot tr.dimmed td:first-child { color: var(--muted) !important }
  tfoot tr.dimmed .score-val { color: var(--muted) !important }
  tbody tr{border-bottom:1px solid rgba(42,42,74,.6);animation:rowIn .3s ease;-webkit-tap-highlight-color:transparent}
  tbody tr.editable{cursor:pointer;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  tbody tr.editable:active{background:rgba(232,176,75,.1)}
  tbody tr.editing{background:rgba(232,176,75,.08);outline:2px solid var(--accent)}
  @keyframes rowIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
  tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
  tr.round-sep td{padding:0;height:0;border-bottom:2px dashed rgba(232,176,75,.35)}
  td{padding:7px 5px;text-align:center;font-size:12px;vertical-align:middle}
  td:first-child{color:var(--muted);font-size:9px;text-align:left;width:24px}
  .score-val{font-weight:600;font-size:13px}
  .score-val.pos{color:var(--green)} .score-val.neg{color:var(--red)} .score-val.zero{color:var(--muted)}
  .game-val{font-size:10px;color:var(--muted)}
  .game-val.pos{color:rgba(46,204,113,.7)} .game-val.neg{color:rgba(231,76,60,.7)}
  .game-type-tag{font-size:8px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:3px;padding:1px 3px;white-space:nowrap}
  .empty-state{text-align:center;padding:34px 20px;color:var(--muted)}
  .empty-state .suits{font-size:34px;letter-spacing:8px;margin-bottom:10px;opacity:.4}
  .empty-state p{font-size:12px;line-height:1.6}

  /* INPUT PANEL */
  .input-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent);box-shadow:0 -8px 30px rgba(0,0,0,.5);z-index:200;max-width:600px;margin:0 auto}
  .panel-summary{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;user-select:none}
  .sum-left{flex:1;min-width:0}
  .sum-players{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sum-players span{color:var(--accent)}
  .sum-type{font-size:9px;color:var(--muted);margin-top:1px}
  .sum-val{font-size:15px;font-weight:700;font-family:'Source Code Pro',monospace;flex-shrink:0}
  .sum-val.pos{color:var(--green)} .sum-val.neg{color:var(--red)}
  .sum-expand{color:var(--muted);font-size:10px;flex-shrink:0;transition:transform .2s}
  .input-panel.open .sum-expand{transform:rotate(180deg)}
  .panel-content{display:none;padding:6px 9px 11px}
  .input-panel.open .panel-content{display:block}

  /* Player buttons */
  .input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px}
  .input-grid.four{grid-template-columns:1fr 1fr 1fr 1fr}
  .player-btn{background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:7px;color:var(--text);font-family:'Source Code Pro',monospace;padding:5px 3px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:1px}
  .player-btn .p-name{font-size:10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .player-btn .p-pts{font-size:8px;color:var(--muted)}
  .player-btn.selected{border-color:var(--accent);background:rgba(232,176,75,.15)}
  .player-btn.selected .p-name{color:var(--accent)}
  .player-btn:active{transform:scale(.96)}

  /* Type buttons */
  .type-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:3px}
  .type-row-2{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:6px}
  .type-btn{background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:9px;padding:4px 2px;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
  .type-btn .type-suit{font-size:12px;display:block}
  .type-btn.active{border-color:var(--accent);background:rgba(232,176,75,.15);color:var(--accent)}
  .type-btn:active{transform:scale(.94)}

  /* Farbe */
  .farbe-row{display:flex;gap:4px;margin-bottom:6px}
  .farbe-btn{flex:1;background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:6px;font-size:17px;padding:4px 2px;cursor:pointer;text-align:center;transition:all .15s;line-height:1}
  .farbe-btn.active{border-color:var(--accent);background:rgba(232,176,75,.18)}
  .farbe-btn:active{transform:scale(.92)}

  /* Factor */
  .factor-row{display:flex;gap:5px;align-items:center;margin-bottom:5px}
  .factor-label{font-size:9px;color:var(--muted);flex-shrink:0;width:44px}
  .stepper{display:flex;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .stepper button{background:none;border:none;color:var(--accent);font-size:16px;width:28px;height:28px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
  .stepper button:active{background:rgba(232,176,75,.15)}
  .stepper span{min-width:24px;text-align:center;font-family:'Source Code Pro',monospace;font-size:12px;font-weight:600}

  /* Ramsch */
  .ramsch-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
  .ramsch-label{font-size:9px;color:var(--muted);flex-shrink:0;width:44px}
  .ramsch-input{flex:1;background:rgba(255,255,255,.05);border:2px solid var(--border);border-radius:6px;color:var(--text);font-family:'Source Code Pro',monospace;font-size:17px;font-weight:700;padding:4px 8px;text-align:center;outline:none}
  .ramsch-input:focus{border-color:var(--accent);background:rgba(232,176,75,.08)}

  /* Null */
  .null-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
  .null-btn{background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:10px;padding:4px 7px;cursor:pointer;transition:all .15s}
  .null-btn.active{border-color:var(--accent);background:rgba(232,176,75,.15);color:var(--accent)}

  /* Details */
  .details-toggle{background:none;border:none;color:var(--muted);font-size:9px;cursor:pointer;padding:0;margin-bottom:4px;display:flex;align-items:center;gap:3px;font-family:'Source Code Pro',monospace}
  .details-toggle:hover{color:var(--accent)}
  .details-toggle .arrow{display:inline-block;transition:transform .2s}
  .details-toggle.open .arrow{transform:rotate(90deg)}
  .details-panel{display:none;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px;padding:6px;margin-bottom:6px}
  .details-panel.open{display:block}
  /* rgh-mode CSS entfernt */
  .detail-opts{display:flex;flex-wrap:wrap;gap:3px}
  .detail-section-label{font-size:8px;color:var(--muted);margin:4px 0 2px;text-transform:uppercase;letter-spacing:.5px}

  /* Jack row */
  .jack-row{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}
  .jack-btn{background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:10px;padding:4px 7px;cursor:pointer;transition:all .15s;font-weight:600}
  .jack-btn.active{border-color:#60a5fa;background:rgba(96,165,250,.2);color:#93c5fd}
  .jack-btn:active{transform:scale(.94)}
  .jack-stepper{display:flex;align-items:center;gap:6px;margin-bottom:4px}
  .jack-card{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
  .jack-pip{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:28px;border-radius:4px;border:1px solid rgba(96,165,250,.5);background:rgba(96,165,250,.12);color:#93c5fd;font-size:11px;font-weight:700;padding:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  html[data-theme="light"] .jack-pip{border-color:rgba(26,58,143,.4);background:#ffffff;color:#1a3a8f;box-shadow:0 1px 3px rgba(0,0,0,.15)}

  /* opt & dbl */
  .opt-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:10px;padding:4px 6px;cursor:pointer;transition:all .15s}
  .opt-btn.active{border-color:var(--accent);background:rgba(232,176,75,.18);color:var(--accent);font-weight:700}
  .opt-btn:active{transform:scale(.94)}
  .dbl-btn{background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:10px;padding:4px 7px;cursor:pointer;transition:all .15s}
  .dbl-btn.active{border-color:var(--purple);background:rgba(168,85,247,.2);color:#c084fc;font-weight:700}
  .dbl-btn:active{transform:scale(.94)}

  /* Value row */
  .value-row{display:flex;gap:5px;align-items:center;margin-top:8px}
  .sign-btn{background:rgba(255,255,255,.06);border:2px solid var(--border);border-radius:7px;font-size:17px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;flex-shrink:0}
  .sign-btn.positive{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.1)}
  .sign-btn.negative{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.1)}
  .sign-btn:active{transform:scale(.92)}
  .calc-display{flex:1;background:rgba(255,255,255,.05);border:2px solid var(--border);border-radius:7px;padding:4px 8px;text-align:center}
  .calc-val{font-size:16px;font-weight:700;font-family:'Source Code Pro',monospace}
  .calc-formula{font-size:8px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .add-btn{background:linear-gradient(135deg,var(--accent),#d4943a);border:none;border-radius:7px;color:#1a1a2e;font-family:'Playfair Display',serif;font-size:13px;font-weight:900;padding:7px 12px;cursor:pointer;flex-shrink:0;transition:all .15s;box-shadow:0 3px 10px rgba(232,176,75,.3)}
  .add-btn.edit-mode{background:#4a9eff;}
  .add-btn:active{transform:scale(.95);box-shadow:none}
  .vormerken-btn{background:linear-gradient(135deg,var(--accent),#d4943a);border:none;border-radius:7px;color:#1a1a2e;font-family:'Playfair Display',serif;font-size:13px;font-weight:900;padding:7px 12px;cursor:pointer;flex-shrink:0;transition:all .15s;box-shadow:0 3px 10px rgba(232,176,75,.3)}
  .vormerken-btn:active{transform:scale(.95);box-shadow:none}
  .vormerken-btn:disabled{opacity:0.35;cursor:default}
  .add-btn:active{transform:scale(.95);box-shadow:none}
  .hint{font-size:9px;color:var(--muted);text-align:center;margin-top:4px}
  .hint span{color:var(--accent)}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--accent);border-radius:13px;padding:20px 16px;width:100%;max-width:310px;box-shadow:0 20px 60px rgba(0,0,0,.7)}
  .modal h2{font-family:'Playfair Display',serif;color:var(--accent);font-size:17px;margin-bottom:7px}
  .modal p{color:var(--muted);font-size:11px;margin-bottom:14px;line-height:1.5}
  .modal-btns{display:flex;gap:7px}
  .btn-cancel{flex:1;padding:9px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Source Code Pro',monospace;font-size:12px;cursor:pointer}
  .btn-confirm{flex:1;padding:9px;background:var(--accent2);border:none;border-radius:7px;color:white;font-family:'Source Code Pro',monospace;font-size:12px;font-weight:600;cursor:pointer}

  /* Settings modal */
  .settings-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .settings-row label{font-size:11px;color:var(--muted);flex:1}
  .settings-input{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Source Code Pro',monospace;font-size:13px;padding:5px 8px;width:80px;text-align:right}
  .currency-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
  .currency-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:13px;padding:4px 8px;cursor:pointer;transition:all .15s}
  .currency-btn.active{border-color:var(--accent);background:rgba(232,176,75,.15);color:var(--accent)}
  /* Money tfoot row */
  tfoot tr.money-row td{background:rgba(232,176,75,.05);border-top:1px solid rgba(232,176,75,.3);font-size:12px;font-weight:600;padding:6px 5px;text-align:center}
  tfoot tr.money-row td:first-child{color:var(--accent);font-family:'Playfair Display',serif;font-size:13px;text-align:left}
  tfoot tr.money-row.dimmed td{color:var(--muted) !important;border-top-color:var(--border) !important;background:transparent !important}
  .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:8px 16px;font-size:11px;color:var(--text);display:none;z-index:300;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
  .toast.show{display:block;animation:toastIn .3s ease}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(7px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .toast button{background:none;border:none;color:var(--accent);font-family:'Source Code Pro',monospace;font-size:11px;cursor:pointer;margin-left:7px;font-weight:600}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span>♠</span> Skat</div>
    <div class="header-actions">
      <div class="lang-btn" id="langBtn" onclick="toggleLangDropdown(event)">
        <span id="langFlag">🇩🇪</span><span id="langCode">DE</span>
        <div class="lang-dropdown" id="langDropdown">
          <div class="lang-option" data-lang="de" onclick="pickLang('de',event)">🇩🇪 DE</div>
          <div class="lang-option" data-lang="en" onclick="pickLang('en',event)">🇬🇧 EN</div>
          <div class="lang-option" data-lang="fr" onclick="pickLang('fr',event)">🇫🇷 FR</div>
          <div class="lang-option" data-lang="es" onclick="pickLang('es',event)">🇪🇸 ES</div>
          <div class="lang-option" data-lang="it" onclick="pickLang('it',event)">🇮🇹 IT</div>
          <div class="lang-option" data-lang="da" onclick="pickLang('da',event)">🇩🇰 DA</div>
          <div class="lang-option" data-lang="th" onclick="pickLang('th',event)">🇹🇭 TH</div>
          <div class="lang-option" data-lang="vi" onclick="pickLang('vi',event)">🇻🇳 VI</div>
        </div>
      </div>
      <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Theme wechseln">☀</button>
      <button class="btn-icon" id="settingsBtn" onclick="openSettings()" title="Einstellungen">⚙</button>
      <button class="btn-icon" id="wakeLockBtn" onclick="toggleWakeLock()" title="Bildschirm wach halten" style="display:none;opacity:0.4">☀</button>
      <button class="btn-icon" id="fontBtn" onclick="toggleFont()" title="Schriftgröße">A</button>
      <button class="btn-icon" id="undoBtn" style="display:none">↩</button>
      <button class="btn-icon" id="resetBtn">🗑</button>
    </div>
  </header>

  <div class="view-tabs" id="viewTabs" style="display:none">
    <button class="view-tab active" id="tab-std" onclick="setView('std')">Σ Standard</button>
    <button class="view-tab" id="tab-sf"  onclick="setView('sf')">SF Turnier</button>
    <button class="view-tab" id="tab-bl"  onclick="setView('bl')">BL Bierlachs</button>
  </div>

  <div class="table-wrap" id="tableWrap" onclick="handleTableWrapClick(event)">
    <div class="empty-state" id="emptyState">
      <div class="suits">♠ ♥ ♦ ♣</div>
      <p id="emptyText"></p>
      <div id="player4Setup" style="margin-top:14px"></div>
    </div>
    <table id="scoreTable" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th id="th0" onclick="editName(0)" style="cursor:pointer">Spieler 1</th>
          <th id="th1" onclick="editName(1)" style="cursor:pointer">Spieler 2</th>
          <th id="th2" onclick="editName(2)" style="cursor:pointer">Spieler 3</th>
          <th id="th3" onclick="editName(3)" style="cursor:pointer;display:none">Spieler 4</th>
          <th class="col-val" id="thVal">Wert</th>
          <th class="col-type" id="thSpiel">Spiel</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>
</div>

<!-- Input Panel -->
<div class="input-panel" id="inputPanel">
  <div class="panel-summary" onclick="togglePanel()">
    <div class="sum-left">
      <div class="sum-players" id="sumPlayers"></div>
      <div class="sum-type" id="sumType"></div>
    </div>
    <div class="sum-val pos" id="sumVal">+18</div>
    <div class="sum-expand">▲</div>
  </div>

  <div class="panel-content">

    <!-- ══ STUFE 1: Reizen ══ -->
    <div id="stage1">
      <!-- Spieler -->
      <div class="input-grid" id="playerGrid">
        <button class="player-btn" id="pbtn0" onclick="togglePlayer(0)">
          <span class="p-name" id="pbtn0name">S1</span>
          <span class="p-pts" id="pbtn0pts">0</span>
        </button>
        <button class="player-btn" id="pbtn1" onclick="togglePlayer(1)">
          <span class="p-name" id="pbtn1name">S2</span>
          <span class="p-pts" id="pbtn1pts">0</span>
        </button>
        <button class="player-btn" id="pbtn2" onclick="togglePlayer(2)">
          <span class="p-name" id="pbtn2name">S3</span>
          <span class="p-pts" id="pbtn2pts">0</span>
        </button>
        <button class="player-btn" id="pbtn3" onclick="togglePlayer(3)" style="display:none">
          <span class="p-name" id="pbtn3name">S4</span>
          <span class="p-pts" id="pbtn3pts">0</span>
        </button>
      </div>

      <!-- Spieltyp -->
      <div class="type-row">
        <button class="type-btn" data-type="karo"   onclick="setType('karo')"  ><span class="type-suit suit-d">♦</span><span data-t="karo"></span></button>
        <button class="type-btn" data-type="herz"   onclick="setType('herz')"  ><span class="type-suit suit-h">♥</span><span data-t="herz"></span></button>
        <button class="type-btn" data-type="pik"    onclick="setType('pik')"   ><span class="type-suit suit-s">♠</span><span data-t="pik"></span></button>
        <button class="type-btn" data-type="kreuz"  onclick="setType('kreuz')" ><span class="type-suit suit-c">♣</span><span data-t="kreuz"></span></button>
      </div>
      <div class="type-row-2">
        <button class="type-btn" data-type="grand"  onclick="setType('grand')" ><span class="type-suit">🃏</span><span data-t="grand"></span></button>
        <button class="type-btn" data-type="null"   onclick="setType('null')"  ><span class="type-suit">∅</span><span data-t="null"></span></button>
        <button class="type-btn" data-type="ramsch" onclick="setType('ramsch')"><span class="type-suit">💀</span><span data-t="ramsch"></span></button>
        <button class="type-btn" data-type="rgh"    onclick="setType('rgh')"   ><span class="type-suit">🃏</span><span data-t="rgh"></span></button>
        <button class="type-btn" data-type="leer"   onclick="setType('leer')"  ><span class="type-suit">⊘</span><span data-t="leer"></span></button>
      </div>

      <!-- Farbe (Faktor) – in Stufe 1 ausgeblendet, nur in Stufe 2 -->
      <div id="calcFarbe" style="display:none">
        <div class="factor-row">
          <span class="factor-label" data-t="faktor"></span>
          <div class="stepper">
            <button onclick="stepFactor(-1)">−</button>
            <span id="factorVal">2</span>
            <button onclick="stepFactor(1)">+</button>
          </div>
          <span style="font-size:9px;color:var(--muted);margin-left:6px" id="baseInfo">9×2=18</span>
        </div>
      </div>

      <!-- Grand -->
      <div id="calcGrand" style="display:none">
        <div class="factor-row">
          <span class="factor-label" data-t="faktor"></span>
          <div class="stepper">
            <button onclick="stepFactor(-1)">−</button>
            <span id="factorValG">2</span>
            <button onclick="stepFactor(1)">+</button>
          </div>
          <span style="font-size:9px;color:var(--muted);margin-left:6px" id="grandInfo">24×2=48</span>
        </div>
      </div>


      <!-- RGH -->
      <div id="calcRGH" style="display:none">
        <div class="factor-row">
          <span class="factor-label" data-t="faktor"></span>
          <div class="stepper">
            <button onclick="stepFactor(-1)">−</button>
            <span id="factorValRGH">2</span>
            <button onclick="stepFactor(1)">+</button>
          </div>
          <span style="font-size:9px;color:var(--muted);margin-left:6px" id="rghInfo">24×2=48</span>
        </div>
      </div>

      <!-- Null -->
      <div id="calcNull" style="display:none">
        <div class="null-row" id="nullBtns"></div>
      </div>

      <!-- Durchmarsch -->
      <div id="calcDurch" style="display:none;font-size:10px;color:var(--muted);margin-bottom:5px;padding:2px 0">
        <span data-t="festWert"></span>: <span style="color:var(--accent);font-weight:700">120 <span data-t="punkte"></span></span>
      </div>

      <!-- Ramsch -->
      <div id="calcRamsch" style="display:none">
        <div id="calcRamschInputRow" class="ramsch-row">
          <button class="dbl-btn" id="ramschDurch" onclick="toggleRamschDurch()" style="font-size:10px;flex-shrink:0">👑 Durch</button>
          <input class="ramsch-input" id="ramschInput" type="number" inputmode="numeric" placeholder="Pkt." min="0" oninput="updateCalcResult()">
          <span style="font-size:9px;color:var(--muted);flex-shrink:0" data-t="verlierer"></span>
        </div>
      </div>

      <!-- Ramsch extras (in Stage 1 sichtbar) -->
      <div id="detailRamsch" style="display:none">
        <div class="detail-section-label" data-t="ramschExtras"></div>
        <div class="detail-opts" style="align-items:center;gap:8px">
          <button class="dbl-btn" id="dJungfrau" onclick="toggleDbl('jungfrau')" data-t="jungfrau"></button>
          <span style="font-size:10px;color:var(--muted);margin-left:4px" data-t="geschoben"></span>
          <div class="stepper" style="margin:0">
            <button onclick="stepGeschoben(-1)">−</button>
            <span id="geschobenVal">0</span>
            <button onclick="stepGeschoben(1)">+</button>
          </div>
        </div>
      </div>

      <!-- Leerrunde -->
      <div id="calcLeer" style="display:none">
        <div style="font-size:10px;color:var(--muted);margin-bottom:5px;padding:2px 0;text-align:center" data-t="leerHint"></div>
      </div>

      <!-- Ansagen (nur Farbe/Grand) -->
      <div id="stage1Ansagen" style="display:none">
        <div class="detail-section-label" data-t="zusaetze"></div>
        <div class="detail-opts">
          <button class="opt-btn" id="dHand"       onclick="toggleOpt('hand')"       data-t="hand"></button>
          <button class="opt-btn" id="dSchneiderA" onclick="toggleOpt('schneiderA')" data-t="schneiderA"></button>
          <button class="opt-btn" id="dSchwarzA"   onclick="toggleOpt('schwarzA')"   data-t="schwarzA"></button>
          <button class="opt-btn" id="dOuvert"     onclick="toggleOpt('ouvert')"     data-t="ouvert"></button>
          <button class="opt-btn" id="dSpitzeA"    onclick="toggleOpt('spitzeA')"    data-t="spitzeA"></button>
        </div>
      </div>
    </div>

    <!-- ══ STUFE 2: Nach dem Spiel ══ -->
    <div id="stage2" style="display:none">
      <!-- Kompakte Zusammenfassung, antippen = zurück zu Stufe 1 -->
      <div id="stage2summary" onclick="backToStage1()" style="cursor:pointer;background:rgba(232,176,75,.08);border:1px solid rgba(232,176,75,.3);border-radius:7px;padding:6px 10px;margin-bottom:8px;font-size:11px;color:var(--accent);display:flex;align-items:center;gap:6px">
        <span style="font-size:14px">✏️</span>
        <span id="stage2summaryText"></span>

      </div>

      <div id="stage2Erreicht" style="display:none">

          <button class="opt-btn" id="dSchwarz"    onclick="toggleOpt('schwarz')"    data-t="schwarz"></button>

          <button class="dbl-btn" id="dKontra"   onclick="toggleDbl('kontra')"   data-t="kontra"></button>
          <button class="dbl-btn" id="dRe"       onclick="toggleDbl('re')"       data-t="re"></button>

        </div>

    <div class="value-row">

    <div class="hint" id="hint"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="resetModal" onclick="if(event.target===this)closeReset()">

    <p id="modalText"></p>

      <button class="btn-cancel" onclick="closeReset()" id="modalCancel"></button>

  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettingsOutside(event)">

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSettings()">Schließen</button>

</div>

// Compute current aussetzer index (only relevant with 4 players)

  if(!state.has4) return -1;
  let idx = 0;
  for(const r of state.rounds){
    if(!r.isRamschGH && r.typeKey!=='rgh') idx = (idx+1) % 4;

  return idx;
}

// ===== CALC =====
function getFarbeVal(){ return FARBEN_VALS[calc.farbeIdx]; }
function getFarbeName(){ return FARBEN_SYM[calc.farbeIdx]+' '+T[lang].farbenNamen[calc.farbeIdx]; }

function isGHActive(){ return calc.type==='rgh'; }
function isDurchActive(){ return calc.type==='ramsch' && document.getElementById('ramschDurch').classList.contains('active'); }

function computeRaw(){
  if(calc.type==='rgh') return 24*calc.factor;
  if(isDurchActive()) return 120 * Math.pow(2, calc.geschoben);
  if(calc.type==='farbe'||calc.type==='grand') return (calc.type==='grand'?24:getFarbeVal())*calc.factor;
  if(calc.type==='null') return calc.nullVal;
  if(calc.type==='leer') return 0;
  if(calc.type==='ramsch'){
    const base=parseInt(document.getElementById('ramschInput').value)||0;
    let m=Math.pow(2, calc.geschoben);
    if(calc.jungfrau)m*=2;
    if(calc.kontra)m*=2;if(calc.re)m*=2;if(calc.bock)m*=2;
    return base*m;
  }
  return 0;
}

function getFormula(){
  if(calc.type==='rgh') return '🃏 RGH 24×'+calc.factor;
  if(isDurchActive()) return 'Ramsch Durch 120'+(calc.geschoben>0?' ×'+Math.pow(2,calc.geschoben)+' ('+calc.geschoben+'× '+t('geschoben')+')':'');
  if(calc.type==='leer') return '⊘ '+t('leer');
  let p=[];
  if(calc.type==='farbe') p.push(getFarbeName()+' '+getFarbeVal()+'×'+calc.factor);
  else if(calc.type==='grand') p.push('Grand 24×'+calc.factor);
  else if(calc.type==='null') p.push(nullLabel(calc.nullVal));
  else if(calc.type==='ramsch'){
    const base=parseInt(document.getElementById('ramschInput').value)||0;
    p.push(t('ramsch')+' '+base);
    if(calc.jungfrau) p.push('×'+t('jungfrau'));
    if(calc.geschoben>0) p.push('×'+Math.pow(2,calc.geschoben)+' ('+calc.geschoben+'× '+t('geschoben')+')');
    if(calc.kontra)p.push('×'+t('kontra'));if(calc.re)p.push('×'+t('re'));if(calc.bock)p.push('×'+t('bock'));
  }
  if(calc.spitzeA) p.push(t('spitzeA')||'Spitze anges.');
  else if(calc.spitze) p.push(t('spitze')||'Spitze');
  if(calc.type!=='ramsch'){
    if(calc.kontra)p.push('×'+t('kontra'));if(calc.re)p.push('×'+t('re'));if(calc.bock)p.push('×'+t('bock'));
  }
  if(calc.verloren)p.push('×2');
  return p.join(' ');
}

function getShortLabel(){
  if(calc.type==='rgh') return '🃏 RGH';
  if(isDurchActive()) return '👑 RDurch';
  if(calc.type==='farbe'){
    const sym=FARBEN_SYM[calc.farbeIdx], name=T[lang].farbenNamen[calc.farbeIdx];
    return sym+' '+name;
  }
  if(calc.type==='grand') return '🃏 Grand';
  if(calc.type==='null') return nullLabel(calc.nullVal);
  if(calc.type==='ramsch') return '💀 '+t('ramsch');
  if(calc.type==='leer') return '⊘ '+t('leer');
  return '';
}

function labelFromKey(r){
  const k=r.typeKey||'';
  if(!k) return r.label||'';
  if(k==='rgh') return '🃏 RGH';
  if(k==='rdurch') return '👑 RDurch';
  if(k.startsWith('farbe:')){
    const idx=parseInt(k.split(':')[1]);
    return FARBEN_SYM[idx]+' '+T[lang].farbenNamen[idx];
  }
  if(k==='grand') return '🃏 Grand';
  if(k.startsWith('null:')){
    const parts=k.split(':');
    const nv=parseInt(parts[1]), hand=parts[2]==='1', ouvert=parts[3]==='1';
    if(nv===92) return nullLabel(92); // Revolution hat eigenen Namen
    let s=t('null');
    if(ouvert) s+=' '+t('ouvert');
    if(hand) s+=' '+t('hand');
    return s;
  }
  if(k==='ramsch') return '💀 '+t('ramsch');
  if(k==='leer') return '⊘ '+t('leer');
  return r.label||'';
}

function labelFromKeyShort(r){
  // Kurzform für Tabellenspalte – nur Null bekommt andere Kurzform
  const k=r.typeKey||'';
  if(k.startsWith('null:')){
    const nv=parseInt(k.split(':')[1]);
    return nullLabelShort(nv);
  }
  return labelFromKey(r);
}

function getFinalValue(){
  let raw=computeRaw();
  const isRamschOnly = calc.type==='ramsch' && !isDurchActive();
  if(!isRamschOnly){if(calc.kontra)raw*=2;if(calc.re)raw*=2;if(calc.bock)raw*=2;}
  if(calc.verloren)raw*=2;
  return sign*raw;
}

function nullLabel(v){
  const labels={de:{23:'Null',35:'Null Hand',46:'Null Ouvert',59:'Null Ouvert Hand',92:'Revolution'},en:{23:'Null',35:'Null Hand',46:'Null Ouvert',59:'Null Ouvert Hand',92:'Revolution'},fr:{23:'Null',35:'Null Main',46:'Null Ouvert',59:'Null Ouvert Main',92:'Révolution'},es:{23:'Null',35:'Null Mano',46:'Null Ouvert',59:'Null Ouvert Mano',92:'Revolución'},it:{23:'Null',35:'Null Mano',46:'Null Ouvert',59:'Null Ouvert Mano',92:'Rivoluzione'}};
  return(labels[lang]||labels.de)[v]||'Null';
}
function nullLabelShort(v){
  // Kurzform für Tabellenspalte
  const s={23:'Null',35:'NullH',46:'NullO',59:'NullOH',92:'Revol.'};
  return s[v]||'Null';
}

function syncFactor(){
  let f=calc.jackCount+1; // Spiel = +1
  if(calc.hand)f++;
  // Schneider: explizit ODER durch Ansage impliziert
  if(calc.schneider||calc.schneiderA)f++;
  if(calc.schneiderA)f++; // Ansage selbst
  // Schwarz: explizit ODER durch Ansage impliziert
  if(calc.schwarz||calc.schwarzA)f++;
  if(calc.schwarzA)f++; // Ansage selbst
  if(calc.ouvert)f++;
  // Spitze: erreicht ODER angesagt (+1 je)
  if(calc.spitze||calc.spitzeA)f++;
  if(calc.spitzeA)f++; // Ansage selbst
  calc.factor=Math.max(2,f);
  const fv=calc.factor.toString();
  ['factorVal','factorValG','factorValRGH'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent=fv;
  });
}

// ===== CALC UI =====
function setType(tp){
  // RGH-Sperre: RGH-Spiele bleiben RGH, andere werden nicht zu RGH
  if(editRoundIdx>=0){
    const origR = state.rounds[editRoundIdx];
    if(origR && origR.isRamschGH && tp!=='rgh') return; // RGH bleibt RGH
    if(origR && !origR.isRamschGH && tp==='rgh') return; // kein Wechsel zu RGH
  }
  // Map suit types to farbe
  const isSuit = tp in SUIT_IDX;
  if(isSuit){ calc.farbeIdx=SUIT_IDX[tp]; calc.type='farbe'; }
  else { calc.type=tp; }
  // Reset Durch if switching away from ramsch
  if(tp!=='ramsch'){
    document.getElementById('ramschDurch').classList.remove('active');
    document.getElementById('calcRamschInputRow').style.display='';
  }
  // Auto-set sign for ramsch/leer
  if(tp==='ramsch' && sign>0){
    sign=-1;
    const b=document.getElementById('signBtn');
    b.textContent='−'; b.className='sign-btn negative';
  } else if(tp!=='ramsch' && tp!=='leer' && sign<0){
    sign=1;
    const b=document.getElementById('signBtn');
    b.textContent='+'; b.className='sign-btn positive';
  }
  // Leer: Spielerauswahl aufheben
  if(tp==='leer'){
    selectedPlayers=[];
  }
  // RGH: Ansagen zurücksetzen, Hand fix setzen
  if(tp==='rgh'){
    calc.schneiderA=false; calc.schwarzA=false; calc.ouvert=false;
    calc.hand=true;
    document.getElementById('dSchneiderA').classList.remove('active');
    document.getElementById('dSchwarzA').classList.remove('active');
    document.getElementById('dOuvert').classList.remove('active');
    document.getElementById('dHand').classList.add('active');
    syncFactor();
  } else if(tp!=='grand' && !isSuit){
    // Wechsel weg von Farbe/Grand: Ansagen zurücksetzen

// Compute SF delta for a single round for player i
function sfDeltaForRound(r, i, n){
  const gegBonus = state.has4 ? 30 : 40;
  const aussetzer = r.aussetzer ?? -1;
  if(r.open===true||r.noPlayer||r.players.length===0) return 0;
  const tk=r.typeKey||r.label||'';
  if(tk==='ramsch'||tk==='rdurch'||tk.includes('💀')||tk.includes('👑')) return 0; // Ramsch/Durch, aber nicht RGH
  const won = r.value > 0;
  if(r.players.includes(i)) return won ? 50 : -50;
  if(i===aussetzer) return 0;
  return won ? 0 : gegBonus;
}

// Compute BL delta for a single round for player i
function blDeltaForRound(r, i, n){
  const aussetzer = r.aussetzer ?? -1;
  if(r.open===true||r.noPlayer||r.players.length===0) return 0;
  if(r.value > 0){
    if(r.players.includes(i)) return 0;
    if(i===aussetzer) return 0;
    return -r.value;
  } else if(r.value < 0){
    if(r.players.includes(i)) return r.value;
    return 0;
  }
  return 0;
}
function computeSF(){
  const n = state.has4 ? 4 : 3;
  const sf = new Array(n).fill(0);
  const gegBonus = state.has4 ? 30 : 40;
  state.rounds.forEach(r=>{
    if(r.open===true||r.noPlayer) return;
    const tk=r.typeKey||r.label||'';
    if(tk==='ramsch'||tk==='rdurch'||tk.includes('💀')||tk.includes('👑')) return; // Ramsch/Durch, aber nicht RGH
    if(r.players.length===0) return;
    const aussetzer = r.aussetzer ?? -1;
    const won = r.value > 0;
    if(won){
      // Alleinspieler gewinnt: +50, Gegenspieler nichts
      r.players.forEach(i=>{ sf[i]+=50; });
    } else {
      // Alleinspieler verliert: -50, Gegenspieler gewinnen: +gegBonus
      r.players.forEach(i=>{ sf[i]-=50; });
      for(let i=0;i<n;i++){ if(!r.players.includes(i)&&i!==aussetzer) sf[i]+=gegBonus; }
    }
  });
  return sf;
}


// ===== BIERLACHS =====
// Nur Minuspunkte zählen.
// Wer Pluspunkte gemacht hätte bekommt 0, wer Minuspunkte bekommt den negativen Wert.
// Ramsch: Verlierer (r.players, r.value < 0) bekommt −Wert, alle anderen 0.
// Normales Spiel gewonnen: Alleinspieler 0, Gegenspieler −Wert.
// Normales Spiel verloren: Alleinspieler −Wert, Gegenspieler 0.
function computeBL(){
  const n = state.has4 ? 4 : 3;
  const bl = new Array(n).fill(0);
  state.rounds.forEach(r=>{
    if(r.noPlayer || r.players.length===0) return;
    const aussetzer = r.aussetzer ?? -1;
    const isRamsch = (r.typeKey==='ramsch') || (!r.isRamschGH && (r.label||'').includes('Ramsch'));
    if(r.value > 0){
      // Gewinner (Alleinspieler) → 0; Verlierer (Gegenspieler) → −Wert
      for(let i=0;i<n;i++){
        if(!r.players.includes(i) && i!==aussetzer) bl[i] -= r.value;
      }
    } else if(r.value < 0){
      // Verlierer → negativer Wert; Gewinner → 0
      r.players.forEach(i=>{ bl[i] += r.value; });
    }
  });
  return bl;
}

    }
    let mCells=`<td>${c}</td>`;
    for(let i=0;i<n;i++){
      let diff=0;
      for(let j=0;j<n;j++) if(j!==i) diff+=(state.totals[i]||0)-(state.totals[j]||0);
      const raw=(diff*moneySettings.rate).toFixed(decimals);
      const display=c==='$' ? c+raw : raw+'\u202f'+c;
      const cls=diff>0?'pos':diff<0?'neg':'zero';
      mCells+=`<td><span class="score-val ${cls}" style="font-size:11px">${display}</span></td>`;
    }
    mCells+='<td></td><td></td>';trM.innerHTML=mCells;tfoot.appendChild(trM);
  }
  setTimeout(()=>{const w=document.getElementById('tableWrap');w.scrollTop=w.scrollHeight;},60);
}

function handleTableWrapClick(e){
  if(editRoundIdx < 0) return;
  // Klick irgendwo in die Tabelle (inkl. Zeilen) beendet Edit-Modus
  // Ausnahme: Long-Press auf andere Zeile startet neuen Edit (wird separat behandelt)
  cancelEditRound(); resetPanel(); renderAll();
}

function addLongPress(el, cb){
  let timer=null, moved=false, isTouchDevice=false;
  el.addEventListener('contextmenu', e=>{ e.preventDefault(); e.stopPropagation(); return false; });
  // Touch (Android/iOS)
  el.addEventListener('touchstart', e=>{
    isTouchDevice=true; moved=false;
    timer=setTimeout(()=>{ if(!moved){ cb(); } }, 500);
  }, {passive:true});
  el.addEventListener('touchmove', ()=>{ moved=true; if(timer){clearTimeout(timer);timer=null;} }, {passive:true});
  el.addEventListener('touchend',  ()=>{ if(timer){clearTimeout(timer);timer=null;} });
  el.addEventListener('touchcancel',()=>{ if(timer){clearTimeout(timer);timer=null;} });
  // Mouse (PC) – nur wenn kein Touch
  el.addEventListener('mousedown', e=>{ if(isTouchDevice||e.button!==0) return; moved=false;
    timer=setTimeout(()=>{ if(!moved){ cb(); } }, 500); });
  el.addEventListener('mousemove', ()=>{ moved=true; if(timer){clearTimeout(timer);timer=null;} });
  el.addEventListener('mouseup',   ()=>{ if(timer){clearTimeout(timer);timer=null;} });
  el.addEventListener('mouseleave',()=>{ if(timer){clearTimeout(timer);timer=null;} });
}

// ===== EDIT ROUND =====
function recomputeAllTotals(){
  const n = state.has4 ? 4 : 3;
  let running = new Array(n).fill(0);
  state.rounds.forEach(r=>{
    if(r.open||r.noPlayer||r.value===null||r.value===undefined){ r.totals=[...running]; return; }
    r.players.forEach(i=>{ running[i]+=r.value; });
    r.totals=[...running];
  });
  state.totals=[...running];
}

function startEditRound(idx){
  if(editRoundIdx>=0) cancelEditRound(); // vorherige Edit abbrechen
  if(hasOpenRound()) return; // offene Runde hat Priorität
  const r = state.rounds[idx];
  if(!r||r.open) return;
  editRoundIdx = idx;
  // calc aus gespeicherten Werten wiederherstellen
  const sc = r.savedCalc || {};
  calc = {
    type: sc.type||'', farbeIdx: sc.farbeIdx||0, factor: sc.factor||2,
    nullVal: sc.nullVal||23, jackCount: sc.jackCount||1, jackDir: sc.jackDir||'mit',
    hand: sc.hand||false, schneider: sc.schneider||false, schneiderA: sc.schneiderA||false,
    schwarz: sc.schwarz||false, schwarzA: sc.schwarzA||false, ouvert: sc.ouvert||false,
    spitze: sc.spitze||false, spitzeA: sc.spitzeA||false,
    kontra: sc.kontra||false, re: sc.re||false, bock: sc.bock||false,
    jungfrau: sc.jungfrau||false, geschoben: sc.geschoben||0, verloren: sc.verloren||false
  };
  selectedPlayers = [...(r.players||[])];
  sign = (r.value!==null && r.value<0) ? -1 : 1;
  panelOpen=true;
  document.getElementById('inputPanel').classList.add('open');
  const suitType = sc.type==='farbe' ? ['karo','herz','pik','kreuz'][sc.farbeIdx||0] : (sc.type||'');
  renderAll();
  // RGH-Sperre: Typ-Buttons für inkompatible Typen dimmen
  const isRGHRound = r.isRamschGH;
  document.querySelectorAll('.type-btn').forEach(b=>{
    const blocked = (isRGHRound && b.dataset.type!=='rgh') || (!isRGHRound && b.dataset.type==='rgh');
    b.disabled = blocked;
    b.style.opacity = blocked ? '0.25' : '';
  });
  setType(suitType);
  // Ramsch-Eingabe wiederherstellen
  if(sc.type==='ramsch'){
    const ri=document.getElementById('ramschInput');
    if(ri) ri.value=Math.abs(r.value)||'';
    if(isDurchActive()){
      ri.value='120'; ri.disabled=true; ri.style.opacity='0.5';
    }
  }
  refreshJackRow(); buildNullBtns();
  // Edit immer in Stage 1: Spieler + Typ änderbar
  document.getElementById('stage1').style.display='';
  document.getElementById('stage2').style.display='none';
  // Ansagen-Buttons für Farbe/Grand wiederherstellen
  updateAnsagenUI();
  // Edit-Modus UI
  document.getElementById('addBtn').textContent=t('speichern');
  document.getElementById('addBtn').classList.add('edit-mode');
  document.getElementById('addBtn').style.display='';
  document.getElementById('addBtn').disabled=false;
  document.getElementById('addBtn').style.opacity='';
  document.getElementById('vormerkenBtn').style.display='none';
  updateCalcUI(); updatePlayerBtns(); updateAnsagenUI(); updatePanelHeight();
  renderTable(); // Zeile hervorheben
}

function saveEditRound(){
  if(editRoundIdx<0) return;
  const idx=editRoundIdx;
  const r=state.rounds[idx];
  const isLeer=calc.type==='leer';
  const isRamschGH=calc.type==='rgh';
  const isRamschDurch=isDurchActive();
  r.players=isLeer?[]:([...selectedPlayers]);
  r.noPlayer=isLeer||selectedPlayers.length===0;
  r.value=isLeer?0:(selectedPlayers.length>0?getFinalValue():0);
  r.label=getShortLabel()||r.label;
  r.typeKey=getTypeKey();
  r.isRamschGH=isRamschGH;
  r.savedCalc={
    type:calc.type, farbeIdx:calc.farbeIdx, nullVal:calc.nullVal,
    hand:calc.hand, schneider:calc.schneider, schneiderA:calc.schneiderA,
    schwarz:calc.schwarz, schwarzA:calc.schwarzA, ouvert:calc.ouvert,
    spitze:calc.spitze, spitzeA:calc.spitzeA,
    kontra:calc.kontra, re:calc.re, bock:calc.bock,

    jackCount:calc.jackCount, jackDir:calc.jackDir, factor:calc.factor,

function updatePlayerBtns(){
  const n = state.has4 ? 4 : 3;
  const aussetzer = state.has4 ? getAussetzer() : -1;
  const isLeer = calc.type==='leer';
  const isEditMode = editRoundIdx>=0;
  document.getElementById('playerGrid').classList.toggle('four', state.has4);
  for(let i=0;i<4;i++){
    const btn=document.getElementById('pbtn'+i);
    const show = i < n;
    btn.style.display = show ? '' : 'none';
    if(!show) continue;
    const isAussetzer = (i === aussetzer);
    btn.classList.toggle('selected', selectedPlayers.includes(i));
    btn.disabled = isAussetzer || isLeer;
    btn.style.opacity = (isAussetzer||isLeer) ? '0.35' : '';
    document.getElementById('pbtn'+i+'name').textContent = state.names[i]||('Spieler '+(i+1));
    const v = state.totals[i]||0;
    const pts = document.getElementById('pbtn'+i+'pts');
    pts.textContent = v+' '+t('punkte');
    pts.style.color = v>0?'var(--green)':v<0?'var(--red)':'';
  }
  document.getElementById('signBtn').disabled = isLeer;
  document.getElementById('signBtn').style.opacity = isLeer ? '0.35' : '';
  const needsPlayer = !isLeer && calc.type!=='';
  const noType = calc.type==='';
  const addBtn = document.getElementById('addBtn');
  const vBtn = document.getElementById('vormerkenBtn');
  const inStage2 = document.getElementById('stage2').style.display!=='none';
  if(isEditMode){
    // Edit-Modus Stage 1: Vormerken für Farbe/Grand/Null/RGH, direkt Speichern für Ramsch/Leer
    const isDirectSave = calc.type==='ramsch'||calc.type==='leer';
    if(isDirectSave){
      addBtn.style.display=''; vBtn.style.display='none';
      const ready = calc.type==='leer' || selectedPlayers.length>0;
      addBtn.disabled=!ready; addBtn.style.opacity=ready?'':'0.35';
    } else if(inStage2){
      // Stage 2 im Edit-Modus: Speichern
      addBtn.style.display=''; vBtn.style.display='none';
      const ready = calc.type!=='' && (selectedPlayers.length>0||calc.type==='leer');
      addBtn.disabled=!ready; addBtn.style.opacity=ready?'':'0.35';
    } else {
      // Stage 1 im Edit-Modus: Vormerken führt zu Stage 2
      addBtn.style.display='none'; addBtn.disabled=true;
      const canVormerken = calc.type!=='' && selectedPlayers.length>0;
      vBtn.style.display=canVormerken?'':'none';
      vBtn.disabled=!canVormerken; vBtn.style.opacity=canVormerken?'':'0.35';
      // Vormerken-Text ändern
      vBtn.textContent=t('weiter')||'Weiter ›';
    }
  } else if(inStage2){
    // Stage 2: Eintragen aktiv, kein Vormerken
    addBtn.style.display='';
    const openR = hasOpenRound() ? state.rounds[openRoundIdx] : null;
    const hasPlayer = openR && (openR.noPlayer || openR.players.length>0);
    addBtn.disabled = noType || !hasPlayer;
    addBtn.style.opacity = addBtn.disabled ? '0.35' : '';
    vBtn.style.display='none';
  } else {
    // Stage 1: Leer/Ramsch/Durch direkt eintragbar, sonst Vormerken
    const isRamschDirect = calc.type==='ramsch'; // inkl. Durch
    if(isLeer || isRamschDirect){
      // Direkt Eintragen: Leer braucht keinen Spieler, Ramsch/Durch schon
      addBtn.style.display='';
      const canAdd = isLeer || selectedPlayers.length>0;
      addBtn.disabled=!canAdd;
      addBtn.style.opacity=canAdd?'':'0.35';
      vBtn.style.display='none';
    } else {
      addBtn.style.display='none';
      addBtn.disabled=true;
      const canVormerken = calc.type!=='' && selectedPlayers.length>0;
      vBtn.style.display = canVormerken ? '' : 'none';
      vBtn.disabled = !canVormerken;
      vBtn.style.opacity = canVormerken ? '' : '0.35';
    }
  }
  updateHint();
}

// ===== ZWEISTUFIGE EINGABE =====
function buildSummaryText(){
  const parts = [];
  // Spieler
  const r = hasOpenRound() ? state.rounds[openRoundIdx] : null;
  const playerIdxs = r ? r.players : selectedPlayers;
  const names = playerIdxs.map(i=>state.names[i]||('S'+(i+1))).join(', ');
  if(names) parts.push(names);
  // Spieltyp – typeKey aus offener Runde nehmen falls vorhanden (enthält Hand/Ouvert bei Null)
  const tk = r ? r.typeKey : getTypeKey();
  const lbl = r ? labelFromKey(r) : getShortLabel();
  parts.push(labelFromKey({typeKey: tk, label: lbl}));
  // Ansagen nur bei Farbe/Grand (nicht bei Null – dort ist Hand/Ouvert im Label)
  const isNull = tk && tk.startsWith('null:');
  if(!isNull){
    if(calc.ouvert)          parts.push(t('ouvert'));
    else if(calc.schwarzA)   parts.push(t('schwarzA'));
    else if(calc.schneiderA) parts.push(t('schneiderA'));
    else if(calc.hand)       parts.push(t('hand'));
    if(calc.spitzeA)         parts.push(t('spitzeA')||'Spitze');
  }
  return parts.join(' · ');
}

function showStage2(){
  document.getElementById('stage1').style.display='none';
  document.getElementById('stage2').style.display='';
  document.getElementById('stage2summaryText').textContent=buildSummaryText();
  const isFarbeGrand = calc.type==='farbe'||calc.type==='grand'||calc.type==='rgh';
  const isRamsch = calc.type==='ramsch';
  document.getElementById('stage2Buben').style.display=isFarbeGrand?'':'none';
  document.getElementById('stage2Erreicht').style.display=isFarbeGrand?'':'none';
  // detailRamsch ist in Stage 1, nicht Stage 2
  document.getElementById('detailNormal').style.display=(!isRamsch&&calc.type!=='leer'&&calc.type!=='')?'':'none';
  // Factor stepper now visible in stage2
  document.getElementById('calcFarbe').style.display=(calc.type==='farbe')?'':'none';
  document.getElementById('calcGrand').style.display=(calc.type==='grand')?'':'none';
  document.getElementById('calcRGH').style.display=(calc.type==='rgh')?'':'none';
  // RGH: Kontra/Re/Bock ausblenden
  const isRGH = calc.type==='rgh';
  document.getElementById('dKontra').style.display=isRGH?'none':'';
  document.getElementById('dRe').style.display=isRGH?'none':'';
  document.getElementById('dBock').style.display=isRGH?'none':'';
  // Stage-2-Buttons komplett zurücksetzen bevor neu belegt wird
  ['dSchneider','dSchwarz','dSpitze','dKontra','dRe','dBock','dVerloren'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.classList.remove('active'); el.style.display=''; }
  });
  calc.schneider=false; calc.schwarz=false; calc.spitze=false; calc.kontra=false; calc.re=false; calc.bock=false; calc.verloren=false;
  // Vorbelegung: Schneider/Schwarz aus Ansagen vorbelegen
  // Angesagte Stufen sind implizit aktiv und werden versteckt
  if(isFarbeGrand){
    const sA = calc.schneiderA, swA = calc.schwarzA;
    // Immer aktiv setzen wenn angesagt
    if(sA || swA){ calc.schneider=true; document.getElementById('dSchneider').classList.add('active'); }
    if(swA){ calc.schwarz=true; document.getElementById('dSchwarz').classList.add('active'); }
    // Verstecken was durch Ansage implizit gesetzt ist
    document.getElementById('dSchneider').style.display = sA ? 'none' : '';
    document.getElementById('dSchwarz').style.display = swA ? 'none' : '';
    // Spitze angesagt → Spitze in Stage 2 vorbelegen und verstecken (analog Schneider)
    if(calc.spitzeA){
      calc.spitze=true;
      document.getElementById('dSpitze').classList.add('active');
      document.getElementById('dSpitze').style.display='none';
    }
    // stage2Erreicht komplett verstecken wenn alles implizit
    const allImplied = swA; // bei Schwarz angesagt sind beide versteckt
    if(allImplied) document.getElementById('stage2Erreicht').style.display='none';
  }
  refreshJackRow();
  syncFactor();
  updateCalcResult();
  updatePanelHeight();
}

function getTypeKey(){
  const isRamschDurch = isDurchActive();
  if(calc.type==='rgh') return 'rgh';
  if(isRamschDurch) return 'rdurch';
  if(calc.type==='farbe') return 'farbe:'+calc.farbeIdx;
  if(calc.type==='grand') return 'grand';
  if(calc.type==='null'){
    // hand und ouvert aus nullVal ableiten
    const hand = calc.nullVal===35||calc.nullVal===59 ? 1 : 0;
    const ouvert = calc.nullVal===46||calc.nullVal===59 ? 1 : 0;
    return 'null:'+calc.nullVal+':'+hand+':'+ouvert;
  }
  if(calc.type==='ramsch') return 'ramsch';
  if(calc.type==='leer') return 'leer';
  return '';
}

function hasOpenRound(){ 
  // Sync openRoundIdx with actual state
  if(openRoundIdx >= 0 && (!state.rounds[openRoundIdx] || !state.rounds[openRoundIdx].open)){
    openRoundIdx = -1;
  }
  if(openRoundIdx < 0){
    const idx = state.rounds.findIndex(r=>r.open===true);
    if(idx >= 0) openRoundIdx = idx;
  }
  return openRoundIdx >= 0; 
}

function vormerken(){
  // Im Edit-Modus: nur zu Stage 2 wechseln ohne neue offene Runde
  if(editRoundIdx>=0){
    showStage2();
    document.getElementById('addBtn').textContent=t('speichern');
    document.getElementById('addBtn').classList.add('edit-mode');
    document.getElementById('addBtn').style.display='';
    document.getElementById('addBtn').disabled=false;
    document.getElementById('addBtn').style.opacity='';
    document.getElementById('vormerkenBtn').style.display='none';
    updatePanelHeight();
    return;
  }
  const isRamschGH = calc.type==='rgh';
  const isRamschDurch = isDurchActive();
  const isLeer = calc.type==='leer';
  const aussetzer = state.has4 ? getAussetzer() : -1;
  const n = state.has4 ? 4 : 3;
  const typeKey = getTypeKey();
  const savedCalc = {
    type: calc.type, farbeIdx: calc.farbeIdx, nullVal: calc.nullVal,
    hand: calc.hand, schneider: calc.schneider, schneiderA: calc.schneiderA,
    schwarz: calc.schwarz, schwarzA: calc.schwarzA, ouvert: calc.ouvert,
    spitzeA: calc.spitzeA,
    geschoben: calc.geschoben, jungfrau: calc.jungfrau,
    jackCount: calc.jackCount, jackDir: calc.jackDir, factor: calc.factor
  };

  if(hasOpenRound()){
    // Bestehende offene Runde aktualisieren (nach Rückkehr aus Stage 2)
    const r = state.rounds[openRoundIdx];
    r.players = isLeer ? [] : [...selectedPlayers];
    r.label = getShortLabel();
    r.typeKey = typeKey;
    r.noPlayer = isLeer || selectedPlayers.length===0;
    r.isRamschGH = isRamschGH;
    r.savedCalc = savedCalc;
  } else {
    // Neue offene Runde anlegen
    const newTotals = [...state.totals];
    while(newTotals.length < n) newTotals.push(0);
    const round = {
      players: isLeer ? [] : [...selectedPlayers],
      value: null,
      label: getShortLabel(),
      typeKey,
      noPlayer: isLeer || selectedPlayers.length===0,
      isRamschGH, aussetzer,
      totals: [...newTotals],
      open: true,
      savedCalc
    };
    openRoundIdx = state.rounds.length;
    state.rounds.push(round);
  }
  save();
  // Calc für Stufe 2 aus savedCalc der offenen Runde holen
  const sc2 = state.rounds[openRoundIdx].savedCalc;
  selectedPlayers=[]; sign=1;
  calc={type:sc2.type, farbeIdx:sc2.farbeIdx,
    factor:sc2.factor, nullVal:sc2.nullVal,
    jackCount:1, jackDir:'mit',
    hand:sc2.hand, schneider:false, schneiderA:sc2.schneiderA,
    schwarz:false, schwarzA:sc2.schwarzA, ouvert:sc2.ouvert,
    spitze:false, spitzeA:sc2.spitzeA||false,
    kontra:false, re:false, bock:false,
    jungfrau:sc2.jungfrau, geschoben:sc2.geschoben,
    verloren:false};
  // Direkt zu Stage 2 wechseln – Panel bleibt offen
  const suitType = sc2.type==='farbe' ?
    ['karo','herz','pik','kreuz'][sc2.farbeIdx] : sc2.type;
  panelOpen=true;
  document.getElementById('inputPanel').classList.add('open');
  renderAll();
  setType(suitType);
  refreshJackRow(); buildNullBtns();
  showStage2();
  updateCalcUI(); updatePlayerBtns(); updatePanelHeight();
}

  editRoundIdx=-1;
  document.getElementById('addBtn').textContent=t('eintragen');
  document.getElementById('addBtn').classList.remove('edit-mode');
  setType(''); setFarbe(0); buildNullBtns(); refreshJackRow();
  panelOpen=false;
  document.getElementById('inputPanel').classList.remove('open');
  updateStageUI(0);
}

function addRound(){
  if(editRoundIdx>=0){ saveEditRound(); return; }
  if(hasOpenRound()){
    // Stufe 2: offene Runde abschließen
    const r = state.rounds[openRoundIdx];
    const n = state.has4 ? 4 : 3;
    const value = r.noPlayer ? 0 : getFinalValue();
    r.value = value;
    r.open = false;
    delete r.open; // sicher entfernen
    // typeKey aus savedCalc nehmen falls calc.type leer
    r.typeKey = getTypeKey() || (r.savedCalc ? r.typeKey : '');
    r.label = getShortLabel() || r.label;
    // Totals neu berechnen
    const base = openRoundIdx > 0 ? [...state.rounds[openRoundIdx-1].totals] : new Array(n).fill(0);
    while(base.length < n) base.push(0);
    if(!r.noPlayer) r.players.forEach(i=>{ base[i]+=value; });
    r.totals = [...base];
    state.totals = [...base];
    openRoundIdx = -1;
    save();
  } else {
    // Normal: direkt eintragen
    const isRamschGH = calc.type==='rgh';
    const isRamschDurch = isDurchActive();
    const isLeer = calc.type==='leer';
    const noPlayer = isLeer || selectedPlayers.length===0;
    const value = isLeer ? 0 : (selectedPlayers.length>0 ? getFinalValue() : 0);
    const label = isLeer ? getShortLabel() : (selectedPlayers.length>0 ? getShortLabel() : '');
    const typeKey = getTypeKey();
    const aussetzer = state.has4 ? getAussetzer() : -1;
    const newTotals=[...state.totals];
    while(newTotals.length < (state.has4?4:3)) newTotals.push(0);
    if(!isLeer) selectedPlayers.forEach(i=>{newTotals[i]+=value;});
    state.rounds.push({players:isLeer?[]:([...selectedPlayers]),value,label,typeKey,noPlayer,isRamschGH,aussetzer,totals:[...newTotals]});
    state.totals=newTotals; save();
  }
  openRoundIdx = -1;
  resetPanel();
  panelOpen = true;
  document.getElementById('inputPanel').classList.add('open');
  renderAll(); updateCalcUI(); updatePanelHeight();
}

function toggleRamschDurch(){
  const btn=document.getElementById('ramschDurch');
  const isDurch=btn.classList.toggle('active');
  // Eingabefeld: bei Durch auf 120 setzen und sperren, sonst freigeben
  const ri=document.getElementById('ramschInput');
  if(isDurch){
    ri.value='120';
    ri.disabled=true;
    ri.style.opacity='0.5';
  } else {
    ri.value='';
    ri.disabled=false;
    ri.style.opacity='';
  }
  // Jungfrau nur bei normalem Ramsch, Geschoben bei beiden
  document.getElementById('dJungfrau').style.display=isDurch?'none':'';
  document.getElementById('detailRamsch').style.display='';
  document.getElementById('detailNormal').style.display='none';
  if(isDurch && sign<0){
    sign=1;
    const b=document.getElementById('signBtn');
    b.textContent='+'; b.className='sign-btn positive';
  } else if(!isDurch && sign>0){
    sign=-1;
    const b=document.getElementById('signBtn');
    b.textContent='−'; b.className='sign-btn negative';
  }
  updateCalcResult(); updatePanelHeight();
}


// ===== UNDO =====
function undoLast(){
  hideToast();
  if(state.rounds.length===0)return;
  lastDeleted=state.rounds.pop();
  if(state.rounds.length===0){
    state.totals=state.has4?[0,0,0,0]:[0,0,0];
  } else {
    state.totals=[...state.rounds[state.rounds.length-1].totals];
  }
  save(); renderAll(); showToast();
}
let toastTimer;
function showToast(){
  document.getElementById('toastText').textContent=t('eingetragen');
  document.getElementById('toast').classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(hideToast,4000);
}
function hideToast(){document.getElementById('toast').classList.remove('show');}

// ===== RESET =====
function closeReset(){
  document.getElementById('resetModal').classList.remove('show');
}
function confirmReset(){
  openRoundIdx=-1;
  state.rounds=[];state.totals=state.has4?[0,0,0,0]:[0,0,0];
  save();resetPanel();renderAll();closeReset();
}

// ===== NAME EDIT =====
function editName(i){
  const th=document.getElementById('th'+i);
  if(th.querySelector('.th-edit'))return;
  const cur=state.names[i];
  th.innerHTML=`<input class="th-edit" id="th-edit-${i}" value="${cur}" maxlength="12">`;
  const inp=document.getElementById('th-edit-'+i);
  inp.focus();inp.select();
  let committed=false;
  function commit(){
    if(committed)return;committed=true;
    const val=inp.value.trim()||('Spieler '+(i+1));
    state.names[i]=val;save();
    th.textContent=val;
    updatePlayerBtns();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){committed=true;th.textContent=cur;}
  });
}

// Service Worker registrieren
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
